name = "jdconley-site"
main = "worker/index.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = ["/a-better-time", "/a-better-time/*", "/api/a-better-time/*"]

[[routes]]
pattern = "jdconley.com"
custom_domain = true

[[routes]]
pattern = "www.jdconley.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "a-better-time"
database_id = "05b1ff98-ad0e-4ed0-81d4-c6da017b6cd9"
migrations_dir = "migrations"

[vars]
SUPPORT_ORIGIN = "https://jdconley.com"
TURNSTILE_SITE_KEY = ""

[[ratelimits]]
name = "SUPPORT_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.woff"]
fallthrough = true
