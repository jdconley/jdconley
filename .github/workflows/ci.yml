name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: ${{ vars.SITE_URL || 'https://jdconley.com' }}
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build:site

      - name: Run unit tests
        run: pnpm --filter @jdconley/jdconley-site run test:unit

      - name: Run Worker tests
        run: pnpm --filter @jdconley/jdconley-site run test:worker

      - name: Install Playwright browser
        run: pnpm --filter @jdconley/jdconley-site exec playwright install --with-deps chromium

      - name: Run site E2E
        run: pnpm run test:e2e:site

      - name: Prepare deterministic local Worker fixtures
        run: |
          pnpm --filter @jdconley/jdconley-site run db:migrate:local
          pnpm --filter @jdconley/jdconley-site run locations:import:local -- --fixtures

      - name: Run Wrangler E2E
        run: pnpm run test:e2e:wrangler:site

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/jdconley-site/playwright-report
            apps/jdconley-site/test-results
          if-no-files-found: ignore
          retention-days: 7
