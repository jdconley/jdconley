name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: ${{ vars.SITE_URL || 'https://jdconley.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build:site

      - name: Validate deploy configuration
        env:
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
        run: |
          if [[ ! "$TURNSTILE_SITE_KEY" =~ ^[A-Za-z0-9_-]{10,}$ ]]; then
            echo "TURNSTILE_SITE_KEY repository variable is missing or malformed." >&2
            exit 1
          fi

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/jdconley-site
          command: deploy --var TURNSTILE_SITE_KEY:${{ vars.TURNSTILE_SITE_KEY }} --var SUPPORT_ORIGIN:https://jdconley.com
